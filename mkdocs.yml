      - 花刀玉手: wiki/weapons/falling_blossom.md
      - 思维泡泡: wiki/weapons/thought_bubble.md
      - 冰霜手镯: wiki/weapons/hail_brace.md
      - 群星之怒: wiki/weapons/stellar_wrath.md
      - 扑克牌: wiki/weapons/poker.md
      - 心之歌: wiki/weapons/song_of_soul.md
      - 毒药瓶: wiki/weapons/poison_vial.md
      - 激光枪: wiki/weapons/laser_gun.md
      - 肉蛋葱鸡: wiki/weapons/mest.md
      - 外卖员: wiki/weapons/delivery_guy.md
      - 蛛丝: wiki/weapons/spider_silk.md
      - 漫画书: wiki/weapons/comic_book.md
      - 香水瓶: wiki/weapons/perfume_bottle.md
      - 金币枪: wiki/weapons/coin_gun.md
      - 扳手: wiki/weapons/wrench.md
      - 唤灵海螺: wiki/weapons/spirit_conch.md
      - 猫之计谋: wiki/weapons/cat_trick.md
      - 极速光轮: wiki/weapons/lightwheel.md
      - 浮游炮: wiki/weapons/option.md
      - 复制器: wiki/weapons/replicator.md
      - 叶子: wiki/weapons/leaf.md
      - 泪水: wiki/weapons/tear.md
      - 月相盘: wiki/weapons/moon_phase_dial.md
      - 火箭炮: wiki/weapons/rocket_launcher.md
