# JustRun2 Wiki — MkDocs Material
# Local: pip install -r wiki/requirements.txt && mkdocs serve
# Site:  https://dsixy.github.io/JustRun2/

site_name: Just Run2 百科
site_description: Just Run2 2D Roguelike 游戏百科 — 武器、角色、波次与构筑说明
site_url: https://dsixy.github.io/JustRun2/
repo_url: https://github.com/Dsixy/JustRun2
repo_name: Dsixy/JustRun2
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  logo: assets/images/icon.svg
  favicon: assets/images/icon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Nunito
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dsixy/JustRun2
  generator: false

nav:
  - 首页: index.md
  - 百科:
      - 百科首页: wiki/README.md
      - 游戏机制: wiki/mechanics.md
      - 角色: wiki/characters.md
      - 属性: wiki/attributes.md
      - 敌人: wiki/enemies.md
      - 掉落物: wiki/items.md
      - Buff 与伤害: wiki/buffs-and-damage.md
  - 武器:
      - 武器索引: wiki/weapons/index.md
      - 已实现武器: wiki/weapons/implemented.md
      - 计划中武器: wiki/weapons/planned.md
      - 手枪: wiki/weapons/pistol.md
      - 狙击枪: wiki/weapons/sniping_riffe.md
      - 霰弹枪: wiki/weapons/shotgun.md
