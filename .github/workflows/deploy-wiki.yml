name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "wiki/**"
      - "asset/image/**"
      - "readme/**"
      - "icon.svg"
      - ".github/workflows/deploy-wiki.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: wiki/requirements.txt

      - name: Install MkDocs
        run: pip install -r wiki/requirements.txt

      - name: Prepare wiki assets
        run: |
          mkdir -p docs/assets/images/game docs/assets/images/screenshots
          cp icon.svg docs/assets/images/
          cp asset/image/*.png docs/assets/images/game/
          cp readme/*.png docs/assets/images/screenshots/

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
